<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Key Generator Resmi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body class="bg-black text-zinc-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-zinc-950 border border-zinc-800 rounded-xl p-6 shadow-2xl space-y-5">
        
        <div class="text-center">
            <h1 class="text-lg font-black text-white tracking-widest uppercase border-b border-zinc-800 pb-3">
                KEY GENERATOR
            </h1>
            <p class="text-[11px] text-zinc-500 mt-2 tracking-wide font-medium">Platform Manajemen Lisensi Mandiri</p>
        </div>

        <div class="space-y-1.5">
            <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider">Nama Customer / Lembaga:</label>
            <input type="text" id="input-customer" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm font-semibold text-white focus:outline-none focus:border-white transition-all placeholder-zinc-600" placeholder="Contoh: Perisai Diri Tenggilis">
        </div>

        <div class="space-y-1.5">
            <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider">Machine ID Perangkat:</label>
            <input type="text" id="input-hwid" class="w-full bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm font-mono font-bold text-zinc-300 focus:outline-none focus:border-white transition-all placeholder-zinc-600" placeholder="Masukkan ID dari komputer klien">
        </div>

        <button onclick="buatLisensiFisik()" class="w-full bg-white hover:bg-zinc-200 text-black font-black py-3 px-4 rounded-lg text-xs transition-all shadow-md uppercase tracking-widest">
            Generate & Download Kunci
        </button>

        <div id="result-box" class="space-y-3 hidden">
            <div class="border-t border-zinc-900 my-4"></div>
            
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-2.5">
                <p class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider">Target File Tujuan:</p>
                <p id="target-filename" class="text-xs font-mono font-bold text-white mt-0.5"></p>
            </div>

            <div class="space-y-1.5">
                <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider">Salinan Kode Teks Kunci:</label>
                <textarea id="text-key-output" readonly class="w-full bg-black border border-zinc-800 rounded-lg p-3 text-xs font-mono text-zinc-400 h-20 focus:outline-none cursor-pointer" onclick="this.select()"></textarea>
            </div>

            <button onclick="salinTeksKunci()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-white font-bold py-2 rounded-lg text-xs transition-all uppercase tracking-wider">
                📋 Salin Teks Kunci
            </button>
        </div>
    </div>

    <script>
        // String ini HARUS SAMA PERSIS dengan SECRET_SALT yang ada di server.js Anda!
        const SECRET_SALT = 'KunciRahasiaAplikasiSilatAnda123!';

        function buatLisensiFisik() {
            const customerName = document.getElementById('input-customer').value.trim();
            const hwId = document.getElementById('input-hwid').value.trim();

            if (!customerName) {
                alert("Mohon masukkan Nama Customer terlebih dahulu!");
                return;
            }
            if (!hwId) {
                alert("Mohon masukkan Machine ID pembeli terlebih dahulu!");
                return;
            }

            // 1. Memformat Nama File: Huruf kecil semua dan hapus spasi kosong
            // Contoh: "Perisai Diri Tenggilis" -> "perisaidiritenggilis"
            const cleanCustomerName = customerName.toLowerCase().replace(/\s+/g, '');
            const finalFileName = `license-${cleanCustomerName}.key`;

            // 2. Kriptografi HMAC-SHA256
            const hash = CryptoJS.HmacSHA256(hwId, SECRET_SALT);
            const licenseKeyString = CryptoJS.enc.Hex.stringify(hash);

            // 3. Tampilkan Hasil Ringkasan di Layar
            document.getElementById('target-filename').textContent = finalFileName;
            document.getElementById('text-key-output').value = licenseKeyString;
            document.getElementById('result-box').classList.remove('hidden');

            // 4. Proses Otomatis Download Berkas dengan Nama Dinamis
            const blob = new Blob([licenseKeyString], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = finalFileName;
            link.click();
            window.URL.revokeObjectURL(link.href);
        }

        function salinTeksKunci() {
            const output = document.getElementById('text-key-output');
            output.select();
            document.execCommand('copy');
            alert('Teks kunci lisensi berhasil disalin!');
        }
    </script>
</body>
</html>
